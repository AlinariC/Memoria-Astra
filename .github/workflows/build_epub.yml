name: Build and Release Publishing Packages

on:
  push:
    paths:
      - "**/Manuscript.md"
      - "**/cover.jpg"
      - "**/metadata.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc zip unzip texlive-xetex fonts-texgyre gh

    - name: Build Books
      run: |
        python3 scripts/publish.py inventory
        python3 scripts/publish.py doctor
        python3 scripts/publish.py build --all
        python3 scripts/build_apple_itmsp.py --all --provider AlinariCampbell

        echo "### Books Published" > release_notes.md
        echo "" >> release_notes.md
        echo "Each ZIP contains Apple Books, Google Play Books, Amazon KDP upload folders, and Apple Transporter metadata packages." >> release_notes.md
        echo "" >> release_notes.md

        for dir in output/*; do
          if [ -d "$dir" ]; then
            zip -r "${dir}.zip" "$dir"
            NAME=$(basename "$dir" | tr '-' ' ')
            echo "- $NAME publishing package" >> release_notes.md
          fi
        done

    - name: Prepare release version and date
      run: |
        echo "RELEASE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: "Memoria Astra Cycle – v1.0.${{ github.run_number }} (${{ env.RELEASE_DATE }})"
        body_path: release_notes.md
        files: |
          output/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
